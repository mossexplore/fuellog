<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 · 加油记</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="login-wrap">
  <h1>⛽ 加油记</h1>
  <div class="card">

    <!-- 第一步：账号密码 -->
    <form id="pwForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="form-group">
        <label for="captchaInput">验证码</label>
        <div class="captcha-row">
          <button type="button" class="captcha-img" id="captchaImg" title="点击刷新" aria-label="刷新验证码"></button>
          <input type="text" id="captchaInput" inputmode="text" autocomplete="off" autocapitalize="characters" maxlength="4" placeholder="输入图中字符" required>
        </div>
      </div>
      <div class="error" id="pwError"></div>
      <button class="btn block" type="submit" id="pwBtn">登录</button>
      <p class="hint" style="text-align:center;margin:12px 0 0"><a href="/register.html">注册新账号</a></p>
    </form>

    <!-- 第二步 A：输入验证码（已绑定） -->
    <form id="totpForm" style="display:none">
      <p class="hint">请输入认证器（Google Authenticator 等）上的 6 位验证码，或一个备用恢复码。</p>
      <div class="form-group">
        <label for="totpCode">验证码 / 恢复码</label>
        <input type="text" id="totpCode" inputmode="numeric" autocomplete="one-time-code" placeholder="6 位数字" required autofocus>
      </div>
      <div class="error" id="totpError"></div>
      <button class="btn block" type="submit" id="totpBtn">验证并登录</button>
      <button class="btn ghost block" type="button" id="totpBack" style="margin-top:8px">返回</button>
    </form>

    <!-- 第二步 B：首次绑定 -->
    <form id="enrollForm" style="display:none">
      <h2 class="section" style="margin-top:0">绑定两步验证</h2>
      <p class="hint">用 Authenticator 扫描下方二维码，或手动输入密钥，然后回填生成的 6 位验证码完成绑定。</p>
      <div class="qr-box"><div id="qr"></div></div>
      <div class="form-group">
        <label>密钥（无法扫码时手动输入）</label>
        <div class="totp-secret" id="secretText"></div>
      </div>
      <div class="form-group">
        <label for="enrollCode">认证器生成的 6 位验证码</label>
        <input type="text" id="enrollCode" inputmode="numeric" autocomplete="one-time-code" placeholder="6 位数字" required>
      </div>
      <div class="error" id="enrollError"></div>
      <button class="btn block" type="submit" id="enrollBtn">确认绑定</button>
    </form>

    <!-- 绑定成功：显示备用恢复码（仅此一次） -->
    <div id="backupStep" style="display:none">
      <h2 class="section" style="margin-top:0">✅ 两步验证已启用</h2>
      <p class="hint" style="color:var(--danger)">请立即保存以下 10 个备用恢复码。每个仅可使用一次，丢失认证器时可用它登录。此后不再显示。</p>
      <div class="backup-codes" id="backupCodes"></div>
      <button class="btn ghost block" type="button" id="copyCodes" style="margin:12px 0">复制全部</button>
      <label class="switch-row" style="justify-content:flex-start;gap:10px">
        <input type="checkbox" id="savedChk"> 我已妥善保存这些恢复码
      </label>
      <button class="btn block" type="button" id="enterBtn" disabled>进入</button>
    </div>

  </div>
</div>
<script src="/assets/qrcode.min.js"></script>
<script src="/assets/app.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const show = (id) => { for (const s of ['pwForm','totpForm','enrollForm','backupStep']) $(s).style.display = s === id ? '' : 'none'; };

// 图形验证码：加载 / 刷新
let captchaId = '';
async function loadCaptcha() {
  $('captchaInput').value = '';
  try {
    const r = await api('/api/captcha');
    captchaId = r.id;
    $('captchaImg').innerHTML = r.svg;
  } catch (ex) {
    $('captchaImg').textContent = '点击重试';
  }
}
$('captchaImg').addEventListener('click', loadCaptcha);
loadCaptcha();

// 第一步：账号密码
$('pwForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('pwBtn').disabled = true; $('pwError').textContent = '';
  try {
    const r = await api('/api/login', { method: 'POST', body: JSON.stringify({
      username: $('username').value.trim(), password: $('password').value,
      captcha_id: captchaId, captcha_text: $('captchaInput').value.trim(),
    }) });
    if (r.step === 'totp') {
      show('totpForm'); $('totpCode').focus();
    } else if (r.step === 'enroll') {
      show('enrollForm');
      $('secretText').textContent = r.secret;
      const qr = qrcode(0, 'M');
      qr.addData(r.otpauth_uri);
      qr.make();
      $('qr').innerHTML = qr.createImgTag(5, 8);
      $('enrollCode').focus();
    }
  } catch (ex) {
    $('pwError').textContent = ex.message;
    loadCaptcha(); // 验证码一次性，失败后换新图
  } finally {
    $('pwBtn').disabled = false;
  }
});

// 第二步 A：验证码登录
$('totpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('totpBtn').disabled = true; $('totpError').textContent = '';
  try {
    const r = await api('/api/login/verify', { method: 'POST', body: JSON.stringify({ code: $('totpCode').value.trim() }) });
    if (r.backup_used) alert(`已使用备用恢复码登录，剩余 ${r.backup_remaining} 个。`);
    location.href = '/';
  } catch (ex) {
    $('totpError').textContent = ex.message;
    $('totpBtn').disabled = false;
  }
});
$('totpBack').addEventListener('click', () => { show('pwForm'); loadCaptcha(); $('username').focus(); });

// 第二步 B：确认绑定
$('enrollForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('enrollBtn').disabled = true; $('enrollError').textContent = '';
  try {
    const r = await api('/api/2fa/enroll', { method: 'POST', body: JSON.stringify({ code: $('enrollCode').value.trim() }) });
    show('backupStep');
    $('backupCodes').innerHTML = r.backup_codes.map((c) => `<span>${c}</span>`).join('');
    window.__codes = r.backup_codes.join('\n');
  } catch (ex) {
    $('enrollError').textContent = ex.message;
    $('enrollBtn').disabled = false;
  }
});

// 备用码保存确认
$('copyCodes').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(window.__codes); toast('已复制'); }
  catch { toast('复制失败，请手动保存', 'error'); }
});
$('savedChk').addEventListener('change', (e) => { $('enterBtn').disabled = !e.target.checked; });
$('enterBtn').addEventListener('click', () => { location.href = '/'; });
</script>
</body>
</html>
