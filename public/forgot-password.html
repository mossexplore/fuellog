<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>找回密码 · 加油记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=20260708e">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg></div>
    <h1>加油记</h1>
    <p>找回你的账号密码</p>
  </div>
  <div class="card">
    <form id="forgotForm">
      <h2 class="section" style="margin-top:0">找回密码</h2>
      <p class="hint">输入用户名或已验证邮箱，我们会发送 6 位数字验证码。</p>
      <div class="form-group">
        <label for="account">用户名 / 邮箱</label>
        <input type="text" id="account" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="captchaInput">验证码</label>
        <div class="captcha-row">
          <button type="button" class="captcha-img" id="captchaImg" title="点击刷新" aria-label="刷新验证码"></button>
          <input type="text" id="captchaInput" inputmode="text" autocomplete="off" autocapitalize="characters" maxlength="4" placeholder="输入图中字符" required>
        </div>
      </div>
      <div class="error" id="forgotError"></div>
      <button class="btn block" type="submit" id="forgotBtn">发送验证码</button>
      <div class="auth-alt">
        <span>想起来了？</span>
        <a class="btn ghost block" href="/login">返回登录</a>
      </div>
    </form>
    <div id="sentBox" style="display:none">
      <h2 class="section" style="margin-top:0">输入邮箱验证码</h2>
      <p class="hint" id="sentHint">如果账号存在且已绑定邮箱，验证码会在几分钟内送达。验证码 15 分钟内有效。</p>
      <form id="resetForm">
        <div class="form-group">
          <label for="emailCode">邮箱验证码</label>
          <input type="text" id="emailCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6 位数字" required>
        </div>
        <div class="form-group">
          <label for="password">新密码</label>
          <input type="password" id="password" autocomplete="new-password" placeholder="至少 8 位" required>
        </div>
        <div class="form-group">
          <label for="password2">确认新密码</label>
          <input type="password" id="password2" autocomplete="new-password" required>
        </div>
        <div class="error" id="resetError"></div>
        <button class="btn block" type="submit" id="resetBtn">确认重置</button>
      </form>
    </div>
    <div id="doneBox" style="display:none">
      <h2 class="section" style="margin-top:0">密码已重置</h2>
      <p class="hint">请使用新密码重新登录。</p>
      <a class="btn block" href="/login">去登录</a>
    </div>
  </div>
</div>
<script src="/assets/app.js?v=20260708-nav"></script>
<script>
const $ = (id) => document.getElementById(id);
let captchaId = '';
let resetAccount = '';
async function loadCaptcha() {
  $('captchaInput').value = '';
  try { const r = await api('/api/captcha'); captchaId = r.id; $('captchaImg').innerHTML = r.svg; }
  catch { $('captchaImg').textContent = '点击重试'; }
}
$('captchaImg').addEventListener('click', loadCaptcha);
loadCaptcha();

$('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('forgotError').textContent = '';
  $('forgotBtn').disabled = true;
  resetAccount = $('account').value.trim();
  try {
    await api('/api/password/forgot', { method: 'POST', body: JSON.stringify({
      account: resetAccount,
      captcha_id: captchaId,
      captcha_text: $('captchaInput').value.trim(),
    }) });
    $('forgotForm').style.display = 'none';
    $('sentBox').style.display = '';
    $('emailCode').focus();
  } catch (ex) {
    $('forgotError').textContent = ex.message;
    loadCaptcha();
    $('forgotBtn').disabled = false;
  }
});

$('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('resetError').textContent = '';
  if ($('password').value !== $('password2').value) { $('resetError').textContent = '两次密码不一致'; return; }
  $('resetBtn').disabled = true;
  try {
    await api('/api/password/reset', { method: 'POST', body: JSON.stringify({
      account: resetAccount,
      code: $('emailCode').value.trim(),
      password: $('password').value,
    }) });
    $('sentBox').style.display = 'none';
    $('doneBox').style.display = '';
  } catch (ex) {
    $('resetError').textContent = ex.message;
    $('resetBtn').disabled = false;
  }
});
</script>
</body>
</html>
