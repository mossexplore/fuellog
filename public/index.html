<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>仪表盘 · 加油记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=20260708e">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">
    <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg></span>
    加油记
  </a>
  <nav>
    <a href="/" class="active">仪表盘</a>
    <a href="/records">记录</a>
    <a href="/account">账户</a>
  </nav>
</header>

<div class="container dash-page">
  <div class="dash-hero">
    <div class="dash-hero-label">平均油耗</div>
    <div class="dash-hero-value"><b id="m-consumption">—</b><small>升/百公里</small></div>
    <div class="dash-hero-grid">
      <div><b id="m-last-seg">—</b><span>最近一箱<em id="m-last-delta"></em></span></div>
      <div><b id="m-cost-km">—</b><span>每公里油费</span></div>
      <div><b id="m-distance">—</b><span>累计里程</span></div>
      <div><b id="m-paid">—</b><span>累计油费</span></div>
      <div><b id="m-volume">—</b><span>累计加油量</span></div>
      <div><b id="m-count">—</b><span>加油次数</span></div>
    </div>
  </div>

  <p class="hint" id="guide" style="display:none"></p>

  <div class="chart-card dash-chart">
    <div class="dash-chart-head">
      <div class="dash-tabs" id="chartTabs"></div>
      <div class="dash-year">
        <select id="yearSelect" aria-label="选择年份"></select>
        <svg viewBox="0 0 24 24" fill="none" stroke="#8494ab" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
      </div>
    </div>
    <div class="chart-box"><canvas id="dchart"></canvas></div>
    <div class="dash-unit">单位：<span id="chartUnit">—</span></div>
  </div>
</div>


<script src="/assets/chart.umd.min.js?v=4.4.3"></script>
<script src="/assets/app.js?v=20260708-nav"></script>
<script>
(async () => {
  const s = await api('/api/stats');
  const $ = (id) => document.getElementById(id);

  // ---------- 顶部 hero 指标 ----------
  $('m-consumption').textContent = s.avg_consumption_l_per_100km == null ? '—' : fmt(s.avg_consumption_l_per_100km);
  $('m-cost-km').textContent = s.avg_cost_yuan_per_km == null ? '—' : '¥' + fmt(s.avg_cost_yuan_per_km);
  $('m-distance').innerHTML = fmt(s.total_distance_km, 0) + ' <small>km</small>';
  $('m-paid').textContent = '¥' + fmt(s.total_paid_yuan, 0);
  $('m-volume').innerHTML = fmt(s.total_volume_l, 1) + ' <small>L</small>';
  $('m-count').innerHTML = fmt(s.refuel_count, 0) + ' <small>次</small>';
  $('m-last-seg').textContent = s.last_segment_consumption == null ? '—' : fmt(s.last_segment_consumption);
  // 最近一箱较上一箱的变化（下降为好，标绿；上升标红）
  if (s.segments.length >= 2) {
    const d = s.segments[s.segments.length - 1].consumption - s.segments[s.segments.length - 2].consumption;
    if (Math.abs(d) >= 0.005) {
      const el = $('m-last-delta');
      el.textContent = (d < 0 ? ' ↓' : ' ↑') + fmt(Math.abs(d));
      el.className = d < 0 ? 'delta-down' : 'delta-up';
    }
  }

  const guide = $('guide');
  if (s.refuel_count === 0) {
    guide.textContent = '还没有记录，点击右下角「+」记录第一次加油。';
    guide.style.display = 'block';
  } else if (s.avg_consumption_l_per_100km == null) {
    guide.textContent = '平均油耗需要至少两次「加满跳枪」的记录才能计算，再记录一次加满即可。';
    guide.style.display = 'block';
  }

  // ---------- 单图多指标 + 年份筛选 ----------
  // 顺序：油耗 / 油价 / 油费 / 里程；油耗、油价用折线，油费（每次加油费用）、里程（每次记录里程增量）用柱状图
  const tabs = [
    { key: 'cons',  label: '油耗', unit: '升/百公里', color: '#2563eb', fill: 'rgba(37,99,235,.18)', type: 'line',
      pts: s.segments.map(x => ({ y: x.date.slice(0, 4), d: x.date, v: x.consumption })) },
    { key: 'price', label: '油价', unit: '元/升', color: '#d97706', fill: 'rgba(217,119,6,.16)', type: 'line',
      pts: s.price_trend.map(x => ({ y: x.date.slice(0, 4), d: x.date, v: x.price })) },
    { key: 'cost',  label: '油费', unit: '元', color: '#7c3aed', type: 'bar',
      pts: (s.refuels || []).map(x => ({ y: x.date.slice(0, 4), d: x.date, v: x.paid_yuan })) },
    { key: 'dist',  label: '里程', unit: '公里', color: '#059669', type: 'bar',
      pts: (s.refuels || []).map(x => ({ y: x.date.slice(0, 4), d: x.date, v: x.distance_km })) },
  ];
  // 年份：由近到远（倒序）
  const years = [...new Set((s.refuels || []).map(x => x.date.slice(0, 4)))].sort().reverse();
  let curTab = 'cons', curYear = 'all', chart = null;
  if (window.fuellogOnPageDispose) {
    fuellogOnPageDispose(() => {
      if (chart) { chart.destroy(); chart = null; }
    });
  }

  const tabOf = (k) => tabs.find(t => t.key === k);
  const series = () => {
    const t = tabOf(curTab);
    const pts = t.pts.filter(p => p.v != null && (curYear === 'all' || p.y === curYear));
    return { labels: pts.map(p => p.d), data: pts.map(p => p.v) };
  };

  // 年份下拉
  const sel = $('yearSelect');
  sel.innerHTML = ['all'].concat(years).map(y => `<option value="${y}">${y === 'all' ? '全部年份' : y + ' 年'}</option>`).join('');
  sel.value = 'all';
  sel.addEventListener('change', () => { curYear = sel.value; apply(); });

  // 指标切换胶囊
  const tabsBox = $('chartTabs');
  tabsBox.innerHTML = tabs.map(t => `<button type="button" data-tab="${t.key}">${t.label}</button>`).join('');
  const paintTabs = () => {
    tabsBox.querySelectorAll('button').forEach(b => {
      const t = tabOf(b.dataset.tab);
      const active = b.dataset.tab === curTab;
      b.classList.toggle('active', active);
      b.style.background = active ? t.color : 'transparent';
      b.style.color = active ? '#fff' : '#46618f';
    });
  };
  tabsBox.addEventListener('click', (e) => {
    const b = e.target.closest('button[data-tab]');
    if (!b || b.dataset.tab === curTab) return;
    curTab = b.dataset.tab;
    apply();
  });

  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", "Microsoft YaHei", sans-serif';
  Chart.defaults.color = '#8494ab';

  function buildChart() {
    const t = tabOf(curTab);
    const { labels, data } = series();
    const dataset = t.type === 'bar'
      ? { data, backgroundColor: t.color, borderRadius: 6, borderSkipped: false, maxBarThickness: 30 }
      : {
          data, borderColor: t.color, borderWidth: 2.5, tension: .4, pointRadius: 0, fill: true,
          backgroundColor: (ctx) => {
            const a = ctx.chart.chartArea; if (!a) return t.fill;
            const g = ctx.chart.ctx.createLinearGradient(0, a.top, 0, a.bottom);
            g.addColorStop(0, t.fill); g.addColorStop(1, 'rgba(0,0,0,0)'); return g;
          },
        };
    chart = new Chart($('dchart'), {
      type: t.type,
      data: { labels, datasets: [dataset] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 700, easing: 'easeOutQuart' },
        // 点击/触摸数据位置即显示该点具体数值
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            backgroundColor: 'rgba(20,28,45,.94)', titleColor: 'rgba(255,255,255,.7)', bodyColor: '#fff',
            displayColors: false, padding: 10, cornerRadius: 8,
            titleFont: { size: 11, weight: '600' }, bodyFont: { size: 14, weight: '700' },
            callbacks: {
              title: (items) => items[0].label,
              label: (ctx) => fmt(ctx.parsed.y) + ' ' + tabOf(curTab).unit,
            },
          },
        },
        scales: {
          y: { border: { display: false }, grid: { color: 'rgba(26,42,71,.06)', drawTicks: false }, ticks: { maxTicksLimit: 4, font: { size: 10 }, color: '#8494ab' } },
          x: { display: false },
        },
      },
    });
  }

  // 折线↔柱状切换需要重建图表
  function apply() {
    $('chartUnit').textContent = tabOf(curTab).unit;
    paintTabs();
    if (chart) { chart.destroy(); chart = null; }
    buildChart();
  }

  apply();
})();
</script>
</body>
</html>
