<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>重置密码 · 加油记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=20260708e">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg></div>
    <h1>加油记</h1>
    <p>设置新的登录密码</p>
  </div>
  <div class="card">
    <form id="resetForm">
      <h2 class="section" style="margin-top:0">重置密码</h2>
      <p class="hint">输入用户名或邮箱、邮件中的 6 位验证码和新密码。重置成功后，旧设备会自动退出登录。</p>
      <div class="form-group">
        <label for="account">用户名 / 邮箱</label>
        <input type="text" id="account" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="emailCode">邮箱验证码</label>
        <input type="text" id="emailCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6 位数字" required>
      </div>
      <div class="form-group">
        <label for="password">新密码</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="至少 8 位" required>
      </div>
      <div class="form-group">
        <label for="password2">确认新密码</label>
        <input type="password" id="password2" autocomplete="new-password" required>
      </div>
      <div class="error" id="resetError"></div>
      <button class="btn block" type="submit" id="resetBtn">确认重置</button>
    </form>
    <div id="doneBox" style="display:none">
      <h2 class="section" style="margin-top:0">密码已重置</h2>
      <p class="hint">请使用新密码重新登录。</p>
      <a class="btn block" href="/login">去登录</a>
    </div>
  </div>
</div>
<script src="/assets/app.js?v=20260708-nav"></script>
<script>
const $ = (id) => document.getElementById(id);

$('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('resetError').textContent = '';
  if ($('password').value !== $('password2').value) { $('resetError').textContent = '两次密码不一致'; return; }
  $('resetBtn').disabled = true;
  try {
    await api('/api/password/reset', { method: 'POST', body: JSON.stringify({
      account: $('account').value.trim(),
      code: $('emailCode').value.trim(),
      password: $('password').value,
    }) });
    $('resetForm').style.display = 'none';
    $('doneBox').style.display = '';
  } catch (ex) {
    $('resetError').textContent = ex.message;
    $('resetBtn').disabled = false;
  }
});
</script>
</body>
</html>
