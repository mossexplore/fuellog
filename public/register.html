<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>注册 · 加油记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=20260708e">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg></div>
    <h1>加油记</h1>
    <p>创建账号，开始记录油耗</p>
  </div>
  <div class="card">
    <div id="closed" style="display:none">
      <p class="hint" style="text-align:center">注册当前已关闭，请联系管理员。</p>
      <a class="btn ghost block" href="/login" style="margin-top:12px">返回登录</a>
    </div>

    <form id="regForm" style="display:none">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" autocomplete="username" placeholder="3-20 位字母、数字或下划线" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="text" id="email" autocomplete="email" placeholder="用于找回密码，可稍后验证">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="至少 8 位" required>
      </div>
      <div class="form-group">
        <label for="password2">确认密码</label>
        <input type="password" id="password2" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="captchaInput">验证码</label>
        <div class="captcha-row">
          <button type="button" class="captcha-img" id="captchaImg" title="点击刷新" aria-label="刷新验证码"></button>
          <input type="text" id="captchaInput" inputmode="text" autocomplete="off" autocapitalize="characters" maxlength="4" placeholder="输入图中字符" required>
        </div>
      </div>
      <div class="error" id="regError"></div>
      <button class="btn block" type="submit" id="regBtn">注册</button>
      <div class="auth-alt">
        <span>已有账号？</span>
        <a class="btn ghost block" href="/login">返回登录</a>
      </div>
    </form>
  </div>
</div>
<script src="/assets/app.js?v=20260708-nav"></script>
<script>
const $ = (id) => document.getElementById(id);
let captchaId = '';
async function loadCaptcha() {
  $('captchaInput').value = '';
  try { const r = await api('/api/captcha'); captchaId = r.id; $('captchaImg').innerHTML = r.svg; }
  catch { $('captchaImg').textContent = '点击重试'; }
}
$('captchaImg').addEventListener('click', loadCaptcha);

(async () => {
  const st = await api('/api/register').catch(() => ({ open: false }));
  if (st.open) { $('regForm').style.display = ''; loadCaptcha(); }
  else { $('closed').style.display = ''; }
})();

$('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = $('regError'); err.textContent = '';
  if ($('password').value !== $('password2').value) { err.textContent = '两次密码不一致'; return; }
  $('regBtn').disabled = true;
  try {
    await api('/api/register', { method: 'POST', body: JSON.stringify({
      username: $('username').value.trim(), email: $('email').value.trim(), password: $('password').value,
      captcha_id: captchaId, captcha_text: $('captchaInput').value.trim(),
    }) });
    toast('注册成功，请登录');
    setTimeout(() => location.href = '/login', 1000);
  } catch (ex) {
    err.textContent = ex.message;
    loadCaptcha();
    $('regBtn').disabled = false;
  }
});
</script>
</body>
</html>
