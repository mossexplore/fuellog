<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理 · 加油记</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">⛽ 加油记</a>
  <nav>
    <a href="/">仪表盘</a>
    <a href="/records.html">记录</a>
    <a href="/account.html">账户</a>
    <a href="/admin.html" class="active">管理</a>
    <a href="#" onclick="logout();return false;">登出</a>
  </nav>
</header>

<div class="container">
  <div class="card admin-settings">
    <div class="switch-row">
      <div>
        <div class="admin-setting-title">允许新用户注册</div>
        <div class="hint" id="regState">当前状态：—</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="regToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="admin-summary" id="adminSummary"></div>

  <div class="admin-section-head">
    <h2 class="section">用户</h2>
    <span class="hint" id="userCount">0 个账号</span>
  </div>
  <div id="userList"></div>
</div>

<script src="/assets/app.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let meId = null;

function fmtBytes(n) { n = +n || 0; return n < 1024 ? n + ' B' : n < 1048576 ? (n/1024).toFixed(0) + ' KB' : (n/1048576).toFixed(1) + ' MB'; }
function esc(s) { return String(s ?? '').replace(/[<>&]/g, (m) => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[m])); }

async function loadSettings() {
  const s = await api('/api/admin/settings');
  $('regToggle').checked = !!s.registration_open;
  $('regState').textContent = `当前状态：${s.registration_open ? '开放' : '关闭'}`;
}
$('regToggle').addEventListener('change', async (e) => {
  try {
    await api('/api/admin/settings', { method: 'PATCH', body: JSON.stringify({ registration_open: e.target.checked }) });
    $('regState').textContent = `当前状态：${e.target.checked ? '开放' : '关闭'}`;
    toast('已保存');
  }
  catch (ex) { toast(ex.message, 'error'); e.target.checked = !e.target.checked; }
});

async function loadUsers() {
  const { users } = await api('/api/admin/users');
  const activeCount = users.filter((u) => u.enabled).length;
  const recordTotal = users.reduce((n, u) => n + (+u.record_count || 0), 0);
  const attachmentTotal = users.reduce((n, u) => n + (+u.attachment_count || 0), 0);
  const attachmentBytes = users.reduce((n, u) => n + (+u.attachment_bytes || 0), 0);
  $('userCount').textContent = `${users.length} 个账号`;
  $('adminSummary').innerHTML = `
    <div class="admin-stat"><b>${users.length}</b><span>账号总数</span></div>
    <div class="admin-stat"><b>${activeCount}</b><span>正常账号</span></div>
    <div class="admin-stat"><b>${recordTotal}</b><span>加油记录</span></div>
    <div class="admin-stat"><b>${attachmentTotal}</b><span>附件 · ${fmtBytes(attachmentBytes)}</span></div>
  `;
  $('userList').innerHTML = users.map((u) => {
    const isAdmin = u.role === 'admin';
    const self = u.id === meId;
    const badges =
      `<span class="badge ${isAdmin ? 'full' : ''}">${isAdmin ? '管理员' : '普通'}</span> ` +
      `<span class="badge ${u.enabled ? 'full' : 'partial'}">${u.enabled ? '正常' : '已停用'}</span> ` +
      `<span class="badge ${u.totp_enabled ? 'full' : 'partial'}">2FA ${u.totp_enabled ? '已绑' : '未绑'}</span>`;
    const last = u.last_login_at ? u.last_login_at : '从未登录';
    const lastIp = u.last_login_ip ? esc(u.last_login_ip) : '—';
    const actions = (isAdmin || self) ? '<span class="admin-lock">不可操作</span>' :
      `<button class="btn sm ${u.enabled ? 'danger' : ''}" data-act="toggle" data-id="${u.id}" data-en="${u.enabled ? 0 : 1}">${u.enabled ? '停用' : '启用'}</button>
       <button class="btn sm ghost" data-act="reset" data-id="${u.id}">重置2FA</button>
       <button class="btn sm ghost" data-act="logins" data-id="${u.id}">登录历史</button>
       <button class="btn sm danger" data-act="del" data-id="${u.id}" data-name="${esc(u.username)}">删除</button>`;
    return `<div class="admin-user-card">
      <div class="admin-user-main">
        <div>
          <div class="admin-user-name">${esc(u.username)}</div>
          <div class="admin-badges">${badges}</div>
        </div>
        <div class="admin-user-actions">${actions}</div>
      </div>
      <div class="admin-user-facts">
        <div><b>${last}</b><i>最近登录</i></div>
        <div><b>${lastIp}</b><i>最近 IP</i></div>
        <div><b>${u.login_count}</b><i>登录次数</i></div>
        <div><b>${u.record_count}</b><i>加油记录</i></div>
        <div><b>${u.attachment_count} · ${fmtBytes(u.attachment_bytes)}</b><i>附件</i></div>
        <div><b>${u.created_at}</b><i>注册时间</i></div>
      </div>
      <div class="admin-login-log" id="logins-${u.id}" style="display:none"></div>
    </div>`;
  }).join('');
}

$('userList').addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const id = btn.dataset.id, act = btn.dataset.act;
  try {
    if (act === 'toggle') {
      await api('/api/admin/users/' + id, { method: 'PATCH', body: JSON.stringify({ enabled: btn.dataset.en === '1' }) });
      toast('已更新'); loadUsers();
    } else if (act === 'reset') {
      if (!confirm('确定重置该用户的两步验证？其已绑定的认证器与恢复码将失效。')) return;
      await api('/api/admin/users/' + id + '/reset-2fa', { method: 'POST' });
      toast('已重置'); loadUsers();
    } else if (act === 'del') {
      if (!confirm(`确定彻底删除用户「${btn.dataset.name}」及其全部记录、附件？此操作不可恢复！`)) return;
      await api('/api/admin/users/' + id, { method: 'DELETE' });
      toast('已删除'); loadUsers();
    } else if (act === 'logins') {
      const box = $('logins-' + id);
      if (box.style.display !== 'none') { box.style.display = 'none'; return; }
      const { logins } = await api('/api/admin/users/' + id + '/logins');
      box.innerHTML = logins.length
        ? logins.map((l) => `<div><b>${l.created_at}</b><span>${esc(l.ip || '—')}</span></div>`).join('')
        : '<div><span>暂无登录记录</span></div>';
      box.style.display = '';
    }
  } catch (ex) { toast(ex.message, 'error'); }
});

(async () => {
  try {
    const me = await api('/api/me');
    if (me.role !== 'admin') { location.href = '/'; return; }
    meId = null; // 通过用户列表里 self 判断需要 id；用 username 兜底
    await loadSettings();
    const { users } = await api('/api/admin/users');
    const selfRow = users.find((u) => u.username === me.username);
    meId = selfRow ? selfRow.id : null;
    await loadUsers();
  } catch (ex) { toast(ex.message, 'error'); }
})();
</script>
</body>
</html>
