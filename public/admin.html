<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理 · 加油记</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">⛽ 加油记</a>
  <nav>
    <a href="/">仪表盘</a>
    <a href="/records.html">记录</a>
    <a href="/account.html">账户</a>
    <a href="/admin.html" class="active">管理</a>
    <a href="#" onclick="logout();return false;">登出</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <div class="switch-row" style="padding:0">
      <div>
        <div style="font-weight:600">允许新用户注册</div>
        <div class="hint">关闭后 /register.html 无法注册</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="regToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <h2 class="section">用户（<span id="userCount">0</span>）</h2>
  <div id="userList"></div>
</div>

<script src="/assets/app.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let meId = null;

function fmtBytes(n) { n = +n || 0; return n < 1024 ? n + ' B' : n < 1048576 ? (n/1024).toFixed(0) + ' KB' : (n/1048576).toFixed(1) + ' MB'; }
function esc(s) { return String(s ?? '').replace(/[<>&]/g, (m) => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[m])); }

async function loadSettings() {
  const s = await api('/api/admin/settings');
  $('regToggle').checked = !!s.registration_open;
}
$('regToggle').addEventListener('change', async (e) => {
  try { await api('/api/admin/settings', { method: 'PATCH', body: JSON.stringify({ registration_open: e.target.checked }) }); toast('已保存'); }
  catch (ex) { toast(ex.message, 'error'); e.target.checked = !e.target.checked; }
});

async function loadUsers() {
  const { users } = await api('/api/admin/users');
  $('userCount').textContent = users.length;
  $('userList').innerHTML = users.map((u) => {
    const isAdmin = u.role === 'admin';
    const self = u.id === meId;
    const badges =
      `<span class="badge ${isAdmin ? 'full' : ''}">${isAdmin ? '管理员' : '普通'}</span> ` +
      `<span class="badge ${u.enabled ? 'full' : 'partial'}">${u.enabled ? '正常' : '已停用'}</span> ` +
      `<span class="badge ${u.totp_enabled ? 'full' : 'partial'}">2FA ${u.totp_enabled ? '已绑' : '未绑'}</span>`;
    const last = u.last_login_at ? `${u.last_login_at}（${esc(u.last_login_ip) || '—'}）` : '从未登录';
    const actions = (isAdmin || self) ? '<span class="hint">（管理员/本人不可操作）</span>' :
      `<button class="btn sm ${u.enabled ? 'danger' : ''}" data-act="toggle" data-id="${u.id}" data-en="${u.enabled ? 0 : 1}">${u.enabled ? '停用' : '启用'}</button>
       <button class="btn sm ghost" data-act="reset" data-id="${u.id}">重置2FA</button>
       <button class="btn sm ghost" data-act="logins" data-id="${u.id}">登录历史</button>
       <button class="btn sm danger" data-act="del" data-id="${u.id}" data-name="${esc(u.username)}">删除</button>`;
    return `<div class="record-item">
      <div class="line1"><span class="date">${esc(u.username)}</span><span>${badges}</span></div>
      <div class="line2"><span>最近登录：${last}</span><span>登录 ${u.login_count} 次</span></div>
      <div class="line2"><span>数据：${u.record_count} 条记录</span><span>${u.attachment_count} 个附件 · ${fmtBytes(u.attachment_bytes)}</span><span>注册于 ${u.created_at}</span></div>
      <div class="line3"><span></span><span style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">${actions}</span></div>
      <div class="hint" id="logins-${u.id}" style="display:none;margin-top:8px;white-space:pre-line"></div>
    </div>`;
  }).join('');
}

$('userList').addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const id = btn.dataset.id, act = btn.dataset.act;
  try {
    if (act === 'toggle') {
      await api('/api/admin/users/' + id, { method: 'PATCH', body: JSON.stringify({ enabled: btn.dataset.en === '1' }) });
      toast('已更新'); loadUsers();
    } else if (act === 'reset') {
      if (!confirm('确定重置该用户的两步验证？其已绑定的认证器与恢复码将失效。')) return;
      await api('/api/admin/users/' + id + '/reset-2fa', { method: 'POST' });
      toast('已重置'); loadUsers();
    } else if (act === 'del') {
      if (!confirm(`确定彻底删除用户「${btn.dataset.name}」及其全部记录、附件？此操作不可恢复！`)) return;
      await api('/api/admin/users/' + id, { method: 'DELETE' });
      toast('已删除'); loadUsers();
    } else if (act === 'logins') {
      const box = $('logins-' + id);
      if (box.style.display !== 'none') { box.style.display = 'none'; return; }
      const { logins } = await api('/api/admin/users/' + id + '/logins');
      box.textContent = logins.length ? logins.map((l) => `${l.created_at}  ${l.ip || '—'}`).join('\n') : '暂无登录记录';
      box.style.display = '';
    }
  } catch (ex) { toast(ex.message, 'error'); }
});

(async () => {
  try {
    const me = await api('/api/me');
    if (me.role !== 'admin') { location.href = '/'; return; }
    meId = null; // 通过用户列表里 self 判断需要 id；用 username 兜底
    await loadSettings();
    const { users } = await api('/api/admin/users');
    const selfRow = users.find((u) => u.username === me.username);
    meId = selfRow ? selfRow.id : null;
    await loadUsers();
  } catch (ex) { toast(ex.message, 'error'); }
})();
</script>
</body>
</html>
