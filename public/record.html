<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>记一笔 · 加油记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=20260708-record8">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">
    <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg></span>
    加油记
  </a>
  <nav>
    <a href="/">仪表盘</a>
    <a href="/records">记录</a>
    <a href="/account">账户</a>
  </nav>
</header>

<div class="container">
  <form id="recordForm" class="record-form">
    <section class="record-section record-section-ocr">
      <div class="record-section-head">
        <span class="record-section-kicker">01</span>
        <h2>账单/截图识别</h2>
      </div>
      <p class="record-section-note">上传加油账单后，会自动识别并填充下方加油信息。</p>

      <div class="ocr-box">
        <button type="button" class="btn ghost block" id="ocrBtn">上传截图识别</button>
        <input type="file" id="ocrInput" accept="image/*" hidden>
        <div class="ocr-status" id="ocrStatus"></div>
      </div>

      <div class="form-group">
        <label>账单/截图</label>
        <div class="uploader">
          <label class="upload-btn" for="fileInput">选择文件</label>
          <input type="file" id="fileInput" multiple hidden>
          <span class="hint" id="uploadHint">单个文件 ≤ 10MB，最多 9 个</span>
        </div>
        <div class="attach-grid" id="attachGrid"></div>
      </div>
    </section>

    <section class="record-section">
      <div class="record-section-head">
        <span class="record-section-kicker">02</span>
        <h2>加油信息</h2>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required" for="refuel_date">加油日期</label>
          <input type="date" id="refuel_date" required>
        </div>
        <div class="form-group">
          <label class="required" for="refuel_time">加油时间</label>
          <input type="time" id="refuel_time" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required" for="unit_price">机器显示油价（元/升）</label>
          <input type="number" id="unit_price" inputmode="decimal" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="required" for="volume">加油量（升）</label>
          <input type="number" id="volume" inputmode="decimal" step="0.01" min="0" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required" for="machine_amount">机器显示金额（元）</label>
          <input type="number" id="machine_amount" inputmode="decimal" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="required" for="paid_amount">实付金额（元）</label>
          <input type="number" id="paid_amount" inputmode="decimal" step="0.01" min="0" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required" for="fuel_type">油品标号</label>
          <select id="fuel_type">
            <option>92#</option><option>95#</option><option>98#</option><option>0#柴油</option>
          </select>
        </div>
        <div class="form-group">
          <label class="required" for="is_full">是否加满跳枪</label>
          <div class="switch-field">
            <span>加满</span>
            <label class="switch">
              <input type="checkbox" id="is_full" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="station">加油站（可选）</label>
          <input type="text" id="station" maxlength="50">
        </div>
        <div class="form-group">
          <label for="note">备注（可选）</label>
          <input type="text" id="note" maxlength="200">
        </div>
      </div>
    </section>

    <section class="record-section record-section-mileage">
      <div class="record-section-head">
        <span class="record-section-kicker">03</span>
        <h2>当前里程</h2>
      </div>
      <div class="form-group">
        <label class="required" for="odometer">当前里程（公里）</label>
        <input type="number" id="odometer" inputmode="decimal" step="0.1" min="0" required placeholder="仪表盘累计里程">
      </div>
    </section>

    <div class="error" id="error"></div>
    <button class="btn block" type="submit" id="submitBtn">保存</button>
  </form>
</div>

<script src="/assets/app.js?v=20260708-nav"></script>
<script>
const $ = (id) => document.getElementById(id);
const editId = new URLSearchParams(location.search).get('id');
function createDraftId() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, (c) =>
    (Number(c) ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> Number(c) / 4).toString(16)
  );
}
const draftId = createDraftId();
let paidTouched = false;   // 实付金额是否被手动改过
let machineTouched = false; // 机器金额是否被手动微调过

// ---------- 附件上传 ----------
const MAX_ATTACH = 9, MAX_SIZE = 10 * 1024 * 1024;
let attachments = []; // [{id, filename, content_type, size}]

function fmtSize(n) {
  return n < 1024 ? n + ' B' : n < 1048576 ? (n / 1024).toFixed(0) + ' KB' : (n / 1048576).toFixed(1) + ' MB';
}
// ---------- 图片弹窗预览（点图放大，右上角 × 关闭） ----------
function openLightbox(src) {
  let box = $('lightbox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'lightbox';
    box.className = 'lightbox';
    box.innerHTML = `<button type="button" class="lightbox-close" title="关闭" aria-label="关闭">×</button><img alt="">`;
    box.addEventListener('click', (e) => { if (e.target !== box.querySelector('img')) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
    document.body.appendChild(box);
  }
  box.querySelector('img').src = src;
  box.classList.add('show');
  document.body.style.overflow = 'hidden'; // 弹窗期间禁止背景滚动
}
function closeLightbox() {
  const box = $('lightbox');
  if (box) { box.classList.remove('show'); box.querySelector('img').src = ''; }
  document.body.style.overflow = '';
}

function renderAttachments() {
  const grid = $('attachGrid');
  grid.innerHTML = '';
  for (const a of attachments) {
    const cell = document.createElement('div');
    cell.className = 'attach-cell';
    const src = '/api/attachments/' + a.id;
    if (a.content_type && a.content_type.startsWith('image/')) {
      // 图片：当前页弹窗放大预览，不再新开页面
      cell.innerHTML = `<img src="${src}" alt="${a.filename || ''}" style="cursor:zoom-in">`;
      cell.querySelector('img').addEventListener('click', () => openLightbox(src));
    } else {
      cell.innerHTML = `<a class="file-ico" href="${src}" target="_blank" rel="noopener" title="${a.filename}">
        <span class="ico">📄</span><span class="fn">${a.filename}</span></a>`;
    }
    const del = document.createElement('button');
    del.type = 'button'; del.className = 'attach-del'; del.textContent = '×'; del.title = '删除';
    del.onclick = () => removeAttachment(a.id);
    cell.appendChild(del);
    grid.appendChild(cell);
  }
  const hint = $('uploadHint');
  hint.textContent = attachments.length
    ? `已添加 ${attachments.length}/${MAX_ATTACH} 个`
    : '单个文件 ≤ 10MB，最多 9 个';
}
async function uploadFiles(files) {
  const err = $('error'); err.textContent = '';
  for (const file of files) {
    if (attachments.length >= MAX_ATTACH) { err.textContent = `最多上传 ${MAX_ATTACH} 个附件`; break; }
    if (file.size > MAX_SIZE) { err.textContent = `「${file.name}」超过 10MB，已跳过`; continue; }
    const cell = document.createElement('div');
    cell.className = 'attach-cell uploading';
    cell.textContent = '上传中…';
    $('attachGrid').appendChild(cell);
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('draft_id', draftId);
      const meta = await api('/api/attachments', { method: 'POST', body: fd });
      attachments.push(meta);
    } catch (ex) {
      err.textContent = `「${file.name}」上传失败：${ex.message}`;
    }
    renderAttachments();
  }
}

async function compressImageAttachment(file) {
  if (file.size <= MAX_SIZE || !file.type.startsWith('image/')) return file;
  const bmp = await createImageBitmap(file);
  const maxSide = 2000;
  const scale = Math.min(1, maxSide / Math.max(bmp.width, bmp.height));
  const canvas = document.createElement('canvas');
  canvas.width = Math.max(1, Math.round(bmp.width * scale));
  canvas.height = Math.max(1, Math.round(bmp.height * scale));
  canvas.getContext('2d').drawImage(bmp, 0, 0, canvas.width, canvas.height);
  bmp.close && bmp.close();

  for (const quality of [0.88, 0.76, 0.64]) {
    const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', quality));
    if (blob && blob.size <= MAX_SIZE) {
      const name = (file.name || '截图').replace(/\.[^.]+$/, '') + '.jpg';
      return new File([blob], name, { type: 'image/jpeg' });
    }
  }
  throw new Error('截图超过 10MB，压缩后仍无法作为附件保存');
}
async function removeAttachment(id) {
  try { await api('/api/attachments/' + id, { method: 'DELETE' }); } catch (ex) { /* 忽略：孤儿会被清理 */ }
  attachments = attachments.filter((a) => a.id !== id);
  renderAttachments();
}
$('fileInput').addEventListener('change', (e) => {
  uploadFiles([...e.target.files]);
  e.target.value = ''; // 允许重复选择同名文件
});

// ---------- 供截图识别模块（module 脚本）调用 ----------
const OCR_FIELD_KEYS = ['refuel_date', 'refuel_time', 'unit_price', 'volume', 'machine_amount', 'paid_amount', 'fuel_type', 'station'];
// 清空上一张截图识别填充的字段，避免新图识别失败或识别字段较少时残留旧数据
window.clearOcrFields = function () {
  for (const k of OCR_FIELD_KEYS) {
    const el = $(k);
    if (!el) continue;
    el.value = '';
    el.classList.remove('ocr-filled');
  }
  machineTouched = false;
  paidTouched = false;
};
// 把识别出的字段回填到表单，返回填充的字段数
window.applyOcrFields = function (f) {
  f = f || {};
  window.clearOcrFields();
  let filled = 0;
  for (const k of OCR_FIELD_KEYS) {
    if (f[k] == null || f[k] === '') continue;
    const el = $(k);
    if (!el) continue;
    el.value = f[k];
    el.classList.add('ocr-filled');
    setTimeout(() => el.classList.remove('ocr-filled'), 3000);
    filled++;
  }
  // 每次上传都以本次截图为准，避免上一张截图的金额状态影响自动联动
  machineTouched = f.machine_amount != null && f.machine_amount !== '';
  paidTouched = f.paid_amount != null && f.paid_amount !== '';
  if (!machineTouched) recalcMachine();
  return filled;
};
// 把识别用的原图加入附件列表
window.addRecognizedAttachment = function (meta) {
  if (attachments.length < MAX_ATTACH) { attachments.push(meta); renderAttachments(); }
};
window.uploadRecognizedAttachment = async function (file) {
  const err = $('error');
  if (attachments.length >= MAX_ATTACH) {
    err.textContent = `截图未保存为附件：最多上传 ${MAX_ATTACH} 个附件`;
    return false;
  }
  const cell = document.createElement('div');
  cell.className = 'attach-cell uploading';
  cell.textContent = '截图上传中…';
  $('attachGrid').appendChild(cell);
  try {
    const attachmentFile = await compressImageAttachment(file);
    const fd = new FormData();
    fd.append('file', attachmentFile);
    fd.append('draft_id', draftId);
    const meta = await api('/api/attachments', { method: 'POST', body: fd });
    window.addRecognizedAttachment(meta);
    return true;
  } catch (ex) {
    err.textContent = '截图未保存为附件：' + (ex && ex.message ? ex.message : ex);
    return false;
  } finally {
    cell.remove();
    renderAttachments();
  }
};

function recalcMachine() {
  if (machineTouched) return;
  const p = parseFloat($('unit_price').value), v = parseFloat($('volume').value);
  if (p > 0 && v > 0) {
    const amt = (Math.round(p * v * 100) / 100).toFixed(2);
    $('machine_amount').value = amt;
    if (!paidTouched) $('paid_amount').value = amt;
  }
}
$('unit_price').addEventListener('input', () => { machineTouched = false; recalcMachine(); });
$('volume').addEventListener('input', () => { machineTouched = false; recalcMachine(); });
$('machine_amount').addEventListener('input', () => {
  machineTouched = true;
  if (!paidTouched) $('paid_amount').value = $('machine_amount').value;
});
$('paid_amount').addEventListener('input', () => { paidTouched = true; });

(async () => {
  if (editId) {
    document.title = '编辑记录 · 加油记';
    $('submitBtn').textContent = '保存修改';
    const r = await api('/api/records/' + editId);
    $('refuel_date').value = r.refuel_date;
    $('refuel_time').value = r.refuel_time;
    $('odometer').value = r.odometer;
    $('unit_price').value = r.unit_price;
    $('volume').value = r.volume;
    $('machine_amount').value = r.machine_amount;
    $('paid_amount').value = r.paid_amount;
    $('is_full').checked = !!r.is_full;
    $('fuel_type').value = r.fuel_type || '92#';
    $('station').value = r.station || '';
    $('note').value = r.note || '';
    attachments = r.attachments || [];
    renderAttachments();
    paidTouched = machineTouched = true; // 编辑时不自动覆盖已有值
  } else {
    const now = new Date();
    $('refuel_date').value = now.toISOString().slice(0, 10);
    $('refuel_time').value = now.toTimeString().slice(0, 5);
    // 油价默认带出最近一条记录
    const { items } = await api('/api/records?page=1&size=1');
    if (items.length) {
      $('unit_price').value = items[0].unit_price;
      $('fuel_type').value = items[0].fuel_type || '92#';
    }
  }
})();

document.getElementById('recordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = $('error'); err.textContent = '';
  const body = {
    refuel_date: $('refuel_date').value,
    refuel_time: $('refuel_time').value,
    odometer: parseFloat($('odometer').value),
    unit_price: parseFloat($('unit_price').value),
    volume: parseFloat($('volume').value),
    machine_amount: parseFloat($('machine_amount').value),
    paid_amount: parseFloat($('paid_amount').value),
    is_full: $('is_full').checked,
    fuel_type: $('fuel_type').value,
    station: $('station').value.trim() || null,
    note: $('note').value.trim() || null,
    attachment_ids: attachments.map((a) => a.id),
    draft_id: draftId,
  };
  // 机器金额与 单价×油量 偏差 > 0.1 元时提示确认
  const expected = Math.round(body.unit_price * body.volume * 100) / 100;
  if (Math.abs(body.machine_amount - expected) > 0.1) {
    if (!confirm(`机器显示金额 ${body.machine_amount.toFixed(2)} 元与「油价×加油量」计算值 ${expected.toFixed(2)} 元偏差较大，确认保存？`)) return;
  }
  $('submitBtn').disabled = true;
  try {
    if (editId) {
      await api('/api/records/' + editId, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      await api('/api/records', { method: 'POST', body: JSON.stringify(body) });
    }
    location.href = '/records';
  } catch (ex) {
    err.textContent = ex.message;
    $('submitBtn').disabled = false;
  }
});
</script>

<script type="module">
import { recognizeImage } from '/assets/ocr.js?v=20260706-ocr-message';
const ocrBtn = document.getElementById('ocrBtn');
const ocrInput = document.getElementById('ocrInput');
const ocrStatus = document.getElementById('ocrStatus');
const setS = (m, cls) => { ocrStatus.textContent = m; ocrStatus.className = 'ocr-status' + (cls ? ' ' + cls : ''); };
let ocrRunId = 0;

ocrBtn.addEventListener('click', () => ocrInput.click());
ocrInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const runId = ++ocrRunId;
  window.clearOcrFields();
  ocrBtn.disabled = true;
  setS('已选择新截图，正在准备识别…');
  const attachmentUpload = window.uploadRecognizedAttachment(file).catch(() => null);
  try {
    const { fields } = await recognizeImage(file, (m) => { if (runId === ocrRunId) setS(m); });
    if (runId !== ocrRunId) return;
    const n = window.applyOcrFields(fields);
    setS(n ? `已识别并填充 ${n} 项，请核对（当前里程需手动填写）` : '未识别到加油信息，请手动填写', n ? 'ok' : 'warn');
  } catch (ex) {
    if (runId !== ocrRunId) return;
    setS('识别失败：' + (ex && ex.message ? ex.message : ex) + '，可手动填写', 'warn');
  } finally {
    await attachmentUpload;
    if (runId === ocrRunId) ocrBtn.disabled = false;
  }
});
</script>
</body>
</html>
