<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>加油记录 · 加油记</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">⛽ 加油记</a>
  <nav>
    <a href="/">仪表盘</a>
    <a href="/records.html" class="active">记录</a>
    <a href="/api/export.csv">导出CSV</a>
    <a href="#" onclick="logout();return false;">登出</a>
  </nav>
</header>

<div class="container">
  <div id="list"></div>
  <div class="pager" id="pager" style="display:none">
    <button class="btn ghost sm" id="prevBtn">上一页</button>
    <span class="hint" id="pageInfo"></span>
    <button class="btn ghost sm" id="nextBtn">下一页</button>
  </div>
</div>

<a class="fab" href="/record.html" title="记一笔">+</a>

<script src="/assets/app.js"></script>
<script>
let page = 1;
const SIZE = 20;

async function load() {
  const data = await api(`/api/records?page=${page}&size=${SIZE}`);
  const list = document.getElementById('list');
  if (!data.total) {
    list.innerHTML = '<div class="empty">还没有加油记录，点击右下角「+」开始记录</div>';
    return;
  }
  list.innerHTML = data.items.map(r => `
    <div class="record-item">
      <div class="line1">
        <span class="date">${r.refuel_date} ${r.refuel_time}</span>
        <span class="amount">¥${fmt(r.paid_amount)}</span>
      </div>
      <div class="line2">
        <span>里程 ${fmt(r.odometer, 0)} km${r.distance_delta != null ? `（+${fmt(r.distance_delta, 0)}）` : ''}</span>
        <span>${fmt(r.volume)} 升 × ${fmt(r.unit_price)} 元</span>
        <span>机显 ¥${fmt(r.machine_amount)}</span>
        ${r.station ? `<span>${r.station}</span>` : ''}
      </div>
      ${r.segment_consumption != null ? `
      <div class="seg-metrics">
        <span>🛢️ ${fmt(r.segment_consumption)} <i>升/百公里</i></span>
        <span>💰 ${fmt(r.segment_cost_per_km)} <i>元/公里</i></span>
      </div>` : ''}
      <div class="line3">
        <span>
          <span class="badge ${r.is_full ? 'full' : 'partial'}">${r.is_full ? '加满' : '未加满'}</span>
          <span class="hint">${r.fuel_type || ''}</span>
        </span>
        <span>
          <a class="btn ghost sm" href="/record.html?id=${r.id}">编辑</a>
          <button class="btn danger sm" onclick="del(${r.id}, '${r.refuel_date}')">删除</button>
        </span>
      </div>
      ${r.note ? `<div class="hint" style="margin-top:6px">备注：${r.note}</div>` : ''}
    </div>
  `).join('');

  const pages = Math.ceil(data.total / SIZE);
  const pager = document.getElementById('pager');
  pager.style.display = pages > 1 ? 'flex' : 'none';
  document.getElementById('pageInfo').textContent = `${page} / ${pages} 页（共 ${data.total} 条）`;
  document.getElementById('prevBtn').disabled = page <= 1;
  document.getElementById('nextBtn').disabled = page >= pages;
}

async function del(id, date) {
  if (!confirm(`确认删除 ${date} 的加油记录？删除后统计会即时重算。`)) return;
  try {
    await api('/api/records/' + id, { method: 'DELETE' });
    toast('删除成功');
    await load();
  } catch (ex) {
    toast(ex.message || '删除失败', 'error');
  }
}

document.getElementById('prevBtn').addEventListener('click', () => { page--; load(); });
document.getElementById('nextBtn').addEventListener('click', () => { page++; load(); });
load();
</script>
</body>
</html>
